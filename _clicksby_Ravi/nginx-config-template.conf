# Nginx Configuration Template for Clicks by Ravi
# 
# Usage:
# 1. Replace YOUR_DOMAIN with your actual domain
# 2. Copy to: /etc/nginx/sites-available/clicksby-ravi
# 3. Enable: sudo ln -s /etc/nginx/sites-available/clicksby-ravi /etc/nginx/sites-enabled/
# 4. Test: sudo nginx -t
# 5. Restart: sudo systemctl restart nginx

server {
    # HTTP - will be redirected to HTTPS by Certbot
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static CSS files
    location /css/ {
        alias /home/ubuntu/clicksby_ravi/public/css/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Serve static JavaScript files
    location /js/ {
        alias /home/ubuntu/clicksby_ravi/public/js/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Serve images
    location /images/ {
        alias /home/ubuntu/clicksby_ravi/public/images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Serve uploaded content
    location /uploads/ {
        alias /home/ubuntu/clicksby_ravi/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Serve fonts
    location /fonts/ {
        alias /home/ubuntu/clicksby_ravi/public/fonts/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
